<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Presentation · 14 slides</title>
<link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--neutral-100);font-family:var(--font-sans)}
.deck{max-width:1280px;margin:0 auto;padding:48px 24px 96px;display:flex;flex-direction:column;gap:40px}
.deck-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.deck-head h1{font-family:var(--font-display);font-size:32px;letter-spacing:-0.03em;margin:0;color:var(--neutral-900)}
.deck-head a{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-link)}
.slide-num{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.15em;color:var(--neutral-500);margin-bottom:12px}
.slide-shell{box-shadow:0 24px 48px -16px rgba(15,23,20,.16)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script src="./slideRenderers.jsx" type="text/babel"></script>
</head>
<body>
<div class="deck">
  <div class="deck-head">
    <h1>Master Presentation</h1>
    <a href="../DesignSystem.html">&larr; Back to Design System</a>
  </div>
  <div id="root"></div>
</div>
<script type="text/babel">
  const { order, ...slides } = window.Design System StudioSlides;
  const h = React.createElement;
  function Deck() {
    return h(React.Fragment, null, order.map(([key, label], i) =>
      h('div', { key },
        h('div', { className: 'slide-num' }, String(i + 1).padStart(2, '0') + ' — ' + label),
        h('div', { className: 'slide-shell' }, h(slides[key])))));
  }
  ReactDOM.createRoot(document.getElementById('root')).render(h(Deck));
</script>
</body>
</html>
