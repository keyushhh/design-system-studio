  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf9f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #faf9f5; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element; warn only, real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames - from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below; so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document - a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts - file:// - everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) - location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match; accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative; never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate - a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') - an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent - the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs -
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here - they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec; re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page - from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

pi.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap\");\n\n/* ============================================================\n   DESIGN_SYSTEM_STUDIO - COLOR TOKENS\n   Light mode only. Emerald is the canonical brand color.\n   Base primitives first, then semantic aliases so components\n   target meaning, not palette steps.\n   Derived verbatim from the Master Template Generator's\n   theme-emerald preset + neutral scale (tokens.css).\n   ============================================================ */\n\n:root {\n  /* ---- Pure ---- */\n  --pure-white: #ffffff;\n  --pure-black: #000000;\n\n  /* ---- Brand · Emerald (PRIMARY) ---- */\n  --brand-50:  #ecfdf5;\n  --brand-100: #d1fae5;\n  --brand-200: #a7f3d0;\n  --brand-300: #6ee7b7;\n  --brand-400: #34d399;\n  --brand-500: #10b981;  /* canonical brand emerald */\n  --brand-600: #059669;\n  --brand-650: #047857;\n  --brand-700: #047857;\n  --brand-800: #065f46;\n  --brand-900: #064e3b;\n  --brand-950: #022c22;\n\n  /* ---- Accent · Green (SECONDARY, supports the emerald) ---- */\n  --accent-50:  #f0fdf4;\n  --accent-100: #dcfce7;\n  --accent-200: #bbf7d0;\n  --accent-300: #86efac;\n  --accent-400: #4ade80;\n  --accent-500: #22c55e;\n  --accent-600: #16a34a;\n  --accent-700: #15803d;\n  --accent-800: #166534;\n  --accent-900: #14532d;\n\n  /* ---- Neutral (grayscale foundation) ---- */\n  --neutral-0:   #ffffff;\n  --neutral-50:  #fbfbfb;\n  --neutral-100: #f5f5f5;\n  --neutral-150: #eeeeee;\n  --neutral-200: #e5e5e5;\n  --neutral-300: #d4d4d4;\n  --neutral-400: #a3a3a3;\n  --neutral-500: #737373;\n  --neutral-600: #525252;\n  --neutral-700: #404040;\n  --neutral-800: #262626;\n  --neutral-900: #171717;\n  --neutral-950: #0a0a0a;\n\n  /* ---- Semantic · Success ---- */\n  --success-50:  #f0fdf4;\n  --success-100: #dcfce7;\n  --success-500: #22c55e;\n  --success-600: #16a34a;\n  --success-700: #15803d;\n\n  /* ---- Semantic · Warning ---- */\n  --warning-50:  #fffbeb;\n  --warning-100: #fef3c7;\n  --warning-500: #f59e0b;\n  --warning-600: #d97706;\n  --warning-700: #b45309;\n\n  /* ---- Semantic · Error / Destructive ---- */\n  --error-50:  #fef2f2;\n  --error-100: #fee2e2;\n  --error-500: #ef4444;\n  --error-600: #dc2626;\n  --error-700: #b91c1c;\n\n  /* ---- Semantic · Information ---- */\n  --info-50:  #f0f9ff;\n  --info-100: #e0f2fe;\n  --info-500: #0ea5e9;\n  --info-600: #0284c7;\n  --info-700: #0369a1;\n\n  /* ============================================================\n     SEMANTIC ALIASES - target meaning, not a palette step\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-canvas:  var(--neutral-50);   /* app background */\n  --surface-default: var(--pure-white);   /* cards, panels */\n  --surface-subtle:  #faf9f6;             /* warm card accent */\n  --surface-sunken:  var(--neutral-100);  /* wells, inputs */\n  --surface-inverse: var(--neutral-900);\n  --surface-brand:   var(--brand-500);\n  --surface-brand-subtle: var(--brand-50);\n\n  /* Presentation surfaces (the deck runs on its own two surfaces) */\n  --presentation-light: var(--pure-white);\n  --presentation-dark:  var(--pure-black);\n\n  /* Text */\n  --text-primary:   var(--neutral-900);\n  --text-secondary: var(--neutral-600);\n  --text-muted:     var(--neutral-500);\n  --text-faint:     var(--neutral-400);\n  --text-inverse:   var(--pure-white);\n  --text-brand:     var(--brand-600);\n  --text-on-brand:  var(--pure-white);\n  --text-link:      var(--brand-600);\n  --text-link-hover:var(--brand-700);\n\n  /* Borders */\n  --border-subtle:  var(--neutral-100);\n  --border-default: var(--neutral-200);\n  --border-strong:  var(--neutral-300);\n  --border-brand:   var(--brand-500);\n  --border-inverse: rgba(255,255,255,0.12);\n\n  /* Actions (primary CTA in the shell is neutral-900; brand carries accents) */\n  --action-primary:        var(--neutral-900);\n  --action-primary-hover:  var(--neutral-800);\n  --action-primary-active: var(--neutral-950);\n  --action-brand:          var(--brand-600);\n  --action-brand-hover:    var(--brand-700);\n  --action-brand-subtle:   var(--brand-50);\n\n  /* States */\n  --focus-ring:      var(--brand-500);\n  --state-hover:     var(--neutral-100);\n  --state-selected:  var(--brand-50);\n  --state-selected-fg: var(--brand-700);\n  --state-disabled-bg: var(--neutral-200);\n  --state-disabled-fg: var(--neutral-400);\n\n  /* Opacity guidelines */\n  --opacity-disabled: 0.4; /* @kind other */\n  --opacity-muted:    0.6; /* @kind other */\n  --opacity-subtle:   0.08; /* @kind other */\n  --opacity-ghost:    0.02; /* @kind other */\n\n  /* Grid / editorial hairlines used in the presentation */\n  --grid-line: var(--neutral-200);\n  --grid-line-subtle: var(--neutral-100);\n}\n\n/* ============================================================\n   DESIGN_SYSTEM_STUDIO - TYPOGRAPHY TOKENS\n   Space Grotesk (display), Satoshi (interface/body),\n   JetBrains Mono (labels, metadata, numbers).\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: \"Space Grotesk\", \"Inter\", sans-serif;\n  --font-sans:    \"Satoshi\", \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, SFMono-Regular, monospace;\n\n  /* ---- Size scale (rem, 16px base) ---- */\n  --text-xs:   0.75rem;   /* 12 */\n  --text-sm:   0.875rem;  /* 14 */\n  --text-base: 1rem;      /* 16 */\n  --text-lg:   1.125rem;  /* 18 */\n  --text-xl:   1.25rem;   /* 20 */\n  --text-2xl:  1.5rem;    /* 24 */\n  --text-3xl:  1.875rem;  /* 30 */\n  --text-4xl:  2.25rem;   /* 36 */\n  --text-5xl:  3rem;      /* 48 */\n  --text-6xl:  3.75rem;   /* 60 */\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-black:    900;\n\n  /* ---- Line heights ---- */\n  --leading-none:    0.85;  /* display / oversized numerals */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.625;\n\n  /* ---- Letter spacing / tracking ---- */\n  --tracking-display: -0.05em;  /* large Space Grotesk headings */\n  --tracking-tight:   -0.02em;\n  --tracking-normal:   0em;\n  --tracking-wide:     0.05em;\n  --tracking-label:    0.12em;  /* mono HUD labels */\n  --tracking-wider:    0.2em;   /* mono nav group labels */\n  --tracking-eyebrow:  0.25em;  /* editorial eyebrow */\n}\n\n/* ============================================================\n   DESIGN_SYSTEM_STUDIO - SPACING, RADIUS, ELEVATION, BORDERS, MOTION, LAYOUT\n   Foundations shared by the app shell and the presentation.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (rem) ---- */\n  --space-0:  0px;\n  --space-1:  0.25rem;  /* 4 */\n  --space-2:  0.5rem;   /* 8 */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.25rem;  /* 20 */\n  --space-6:  1.5rem;   /* 24 */\n  --space-8:  2rem;     /* 32 */\n  --space-10: 2.5rem;   /* 40 */\n  --space-12: 3rem;     /* 48 */\n  --space-16: 4rem;     /* 64 */\n  --space-20: 5rem;     /* 80 */\n  --space-24: 6rem;     /* 96 */\n\n  /* ---- Radius scale ----\n     The Master Template Generator ships with SHARP corners\n     (--radius-sharp: 0) as its default editorial feel; the\n     marketing surfaces use the soft scale below. */\n  --radius-sharp: 0px;\n  --radius-sm:   0.375rem;  /* 6  - inputs, small controls */\n  --radius-md:   0.5rem;    /* 8  - buttons, chips */\n  --radius-lg:   0.75rem;   /* 12 - cards */\n  --radius-xl:   1rem;      /* 16 - large cards, dialogs */\n  --radius-2xl:  1.5rem;    /* 24 - feature panels */\n  --radius-full: 9999px;    /* pills, avatars, dots */\n\n  /* ---- Elevation · Shadows ----\n     Interface leans on spacing + contrast; shadows stay soft\n     and rare. Two editorial lifts for the presentation. */\n  --shadow-xs: 0 1px 2px rgb(0 0 0 / 0.05);\n  --shadow-sm: 0 1px 3px rgb(0 0 0 / 0.1);\n  --shadow-md: 0 4px 6px rgb(0 0 0 / 0.1);\n  --shadow-lg: 0 10px 15px rgb(0 0 0 / 0.1);\n  --shadow-xl: 0 20px 25px rgb(0 0 0 / 0.1);\n  --shadow-soft: 0 1px 2px rgba(15,23,20,0.04), 0 12px 32px -12px rgba(15,23,20,0.10);\n  --shadow-lift: 0 2px 4px rgba(15,23,20,0.05), 0 24px 48px -16px rgba(15,23,20,0.16);\n\n  /* ---- Borders ---- */\n  --border-width-none:     0px;\n  --border-width-hairline: 1px;\n  --border-width-medium:   2px;\n  --border-width-thick:    4px;\n\n  /* ---- Motion ---- */\n  --duration-instant: 0ms; /* @kind other */\n  --duration-fast:    150ms; /* @kind other */\n  --duration-normal:  200ms; /* @kind other */\n  --duration-slow:    300ms; /* @kind other */\n  --duration-slower:  500ms; /* @kind other */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-entrance: cubic-bezier(0, 0, 0.2, 1); /* @kind other */\n  --ease-exit:     cubic-bezier(0.4, 0, 1, 1); /* @kind other */\n\n  /* ---- Layout ---- */\n  --sidebar-width: 236px;\n  --content-max:   1180px;\n  --page-margin:   40px;\n\n  /* ---- Presentation geometry ---- */\n  --slide-width:  1920px;\n  --slide-height: 1080px;\n  --slide-pad-x:  140px;  /* editorial left/right margin */\n  --slide-pad-y:  160px;  /* editorial top/bottom margin */\n  --slide-hud-inset: 80px;\n\n  /* ---- Z-index philosophy (few, well-named layers) ---- */\n  --z-base:     0; /* @kind other */\n  --z-content:  10; /* @kind other */\n  --z-sticky:   50; /* @kind other */\n  --z-sidebar:  100; /* @kind other */\n  --z-overlay:  200; /* @kind other */\n  --z-modal:    300; /* @kind other */\n  --z-toast:    400; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n*{margin:0;padding:0;box-sizing:border-box}\nhtml,body{background:#c9c9c9;font-family:var(--font-sans);color:var(--neutral-900);-webkit-font-smoothing:antialiased}\n.book{display:flex;flex-direction:column;align-items:center;gap:40px;padding:48px 24px 90px}\n.page{width:1200px;height:750px;background:#fff;position:relative;overflow:hidden;box-shadow:0 2px 4px rgba(15,23,20,.05),0 24px 48px -16px rgba(15,23,20,.18)}\n.pad{padding:64px 72px}\n.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-600);display:flex;align-items:center;gap:10px}\n.eyebrow::before{content:\"\";width:22px;height:1px;background:var(--brand-500)}\n.foot{position:absolute;left:72px;right:72px;bottom:34px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral-400)}\n.disp{font-family:var(--font-display);letter-spacing:-.03em;line-height:.95}\n.mono{font-family:var(--font-mono)}\n.desc{font-size:12.5px;line-height:1.7;color:var(--neutral-600)}\n.desc h5{font-family:var(--font-sans);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--neutral-900);margin:18px 0 6px}\n.desc h5:first-child{margin-top:0}\n.col-label{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--neutral-400);margin-bottom:20px}\n\n/* ---------- 01 Cover ---------- */\n.cover{background:linear-gradient(150deg,var(--brand-500),var(--brand-800) 88%);color:#fff}\n.cover .wave{position:absolute;inset:0;opacity:.5}\n.cover .wave path{fill:none;stroke:rgba(255,255,255,.14);stroke-width:2}\n.cover .brand{position:absolute;top:56px;left:72px;display:flex;align-items:center;gap:10px;z-index:2}\n.cover .brand img{height:34px}\n.cover-t{position:absolute;left:72px;bottom:120px;z-index:2}\n.cover-t h1{font-family:var(--font-display);font-weight:700;font-size:104px;line-height:.92;letter-spacing:-.03em}\n.cover .cfoot{position:absolute;left:72px;right:72px;bottom:44px;display:flex;justify-content:space-between;z-index:2;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.72)}\n\n/* ---------- Chapter opener ---------- */\n.chapter{background:var(--neutral-950);color:#fff}\n.chapter .num{font-family:var(--font-display);font-size:96px;font-weight:700;letter-spacing:-.03em}\n.chapter .big{font-family:var(--font-display);font-size:120px;font-weight:700;line-height:.9;letter-spacing:-.03em;margin-top:220px}\n.chapter .toc{position:absolute;top:72px;right:72px;text-align:left;width:230px}\n.chapter .toc div{display:flex;gap:10px;align-items:baseline;font-size:14px;color:rgba(255,255,255,.75);padding:9px 0;border-bottom:1px solid rgba(255,255,255,.1)}\n.chapter .toc div::before{content:\"→\";color:var(--brand-400)}\n\n/* type showcase */\n.type-grid{display:grid;grid-template-columns:0.9fr 1.5fr;gap:44px;margin-top:26px}\n.showcase{background:linear-gradient(150deg,var(--brand-600),var(--brand-800));border-radius:0;color:#fff;padding:44px 40px;position:relative;overflow:hidden}\n.showcase .ghost{position:absolute;right:14px;bottom:-30px;font-family:var(--font-display);font-size:260px;font-weight:700;color:rgba(255,255,255,.06);line-height:1}\n.showcase h3{font-family:var(--font-display);font-weight:700;font-size:56px;letter-spacing:-.02em;position:relative;z-index:2}\n.type-row{display:grid;grid-template-columns:90px 1fr;gap:16px;padding:20px 0;border-top:1px solid rgba(255,255,255,.18);position:relative;z-index:2}\n.type-row .l{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;opacity:.8;padding-top:4px}\n.type-row .s{font-size:15px;line-height:1.55}\n\n/* hierarchy */\n.hier{display:grid;grid-template-columns:250px 1fr;gap:52px;margin-top:26px}\n.spec{padding:15px 0;border-top:1px solid var(--neutral-150)}\n.spec:first-child{border-top:none}\n.spec .n{font-family:var(--font-display);font-weight:600;font-size:13.5px;margin-bottom:4px}\n.spec .m{font-family:var(--font-mono);font-size:10px;color:var(--neutral-500);letter-spacing:.02em}\n\n/* logo */\n.logo-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:44px;margin-top:26px}\n.logo-card{height:210px;display:flex;align-items:center;justify-content:center;position:relative}\n.logo-card.on-brand{background:linear-gradient(135deg,var(--brand-700),var(--brand-900))}\n.logo-card.on-light{background:var(--neutral-50);border:1px solid var(--neutral-200)}\n.logo-card img{height:52px}\n.logo-card .tag{position:absolute;top:14px;left:16px;font-family:var(--font-mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase}\n.logo-card.on-brand .tag{color:rgba(255,255,255,.7)}\n.logo-card.on-light .tag{color:var(--neutral-400)}\n.smallest{margin-top:22px;display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--neutral-500)}\n.smallest img{height:16px}\n\n/* colour palette */\n.pal{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:26px;height:430px}\n.pcard{border:1px solid var(--neutral-200);display:flex;flex-direction:column;justify-content:space-between;padding:22px 20px}\n.pcard .top .name{font-family:var(--font-display);font-weight:600;font-size:16px}\n.pcard .top .role{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-top:3px}\n.pcard .specs{font-family:var(--font-mono);font-size:11px;line-height:1.9}\n.pcard .specs b{display:block;font-size:9px;opacity:.6;font-weight:400;text-transform:uppercase;letter-spacing:.06em;margin-top:9px}\n\n/* shades */\n.shades{margin-top:30px;display:flex;flex-direction:column;gap:18px}\n.srow{display:flex;gap:14px;align-items:center}\n.dot{width:52px;height:52px;border-radius:50%;flex-shrink:0}\n.srow .cap{font-family:var(--font-mono);font-size:11px;color:var(--neutral-500);width:150px;flex-shrink:0}\n\n/* key elements */\n.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:26px}\n.kcard{border:1px solid var(--neutral-200);padding:22px}\n.kvis{height:150px;border-radius:0;overflow:hidden;position:relative;background:var(--neutral-50);display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px}\n.kcard h4{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--neutral-900);margin-bottom:8px}\n.kcard p{font-size:12px;line-height:1.6;color:var(--neutral-500)}\n.radii i{display:block;width:44px;height:44px;background:var(--brand-500)}\n.radii i:nth-child(1){border-radius:0}\n.radii i:nth-child(2){border-radius:8px}\n.radii i:nth-child(3){border-radius:16px}\n.shadowbox{width:150px;height:90px;background:#fff;border:1px solid var(--neutral-150);box-shadow:0 2px 4px rgba(15,23,20,.05),0 24px 48px -16px rgba(15,23,20,.16)}\n.patt{width:100%;height:100%;background:linear-gradient(150deg,var(--brand-500),var(--brand-800))}\n\n/* grid */\n.gridpage{background:#fff}\n.gridovl{position:absolute;inset:56px;display:grid;grid-template-columns:repeat(12,1fr);gap:16px}\n.gridovl div{background:color-mix(in srgb,var(--brand-500) 10%,transparent);border:1px solid color-mix(in srgb,var(--brand-500) 22%,transparent)}\n\n@media print{\n  @page{size:1200px 750px;margin:0}\n  html,body{background:#fff}\n  .book{padding:0;gap:0}\n  .page{box-shadow:none;page-break-after:always;break-after:page}\n  .backbar{display:none !important}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<a class=\"backbar\" href=\"DesignSystem.html\" style=\"position:fixed;top:20px;left:20px;z-index:100;display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--neutral-900);color:#fff;font-family:var(--font-sans);font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 2px 4px rgba(15,23,20,.08),0 12px 32px -12px rgba(15,23,20,.2)\"><span style=\"font-size:16px;line-height:1\">←<\u002Fspan> Design System<\u002Fa>\n<div class=\"book\">\n\n  <!-- 01 COVER -->\n  <section class=\"page cover\">\n    <svg class=\"wave\" viewBox=\"0 0 1200 750\" preserveAspectRatio=\"none\">\n      <path d=\"M-50 220 Q 300 120 600 240 T 1250 220\"><\u002Fpath>\n      <path d=\"M-50 320 Q 300 220 600 340 T 1250 320\"><\u002Fpath>\n      <path d=\"M-50 420 Q 300 320 600 440 T 1250 420\"><\u002Fpath>\n      <path d=\"M-50 520 Q 300 420 600 540 T 1250 520\"><\u002Fpath>\n    <\u002Fsvg>\n    <div class=\"brand\"><img src=\"65175c5f-c235-44f6-ae5c-d16463a532df\" alt=\"Design System Studio\"><\u002Fdiv>\n    <div class=\"cover-t\"><h1>BRAND<br>GUIDELINES<\u002Fh1><\u002Fdiv>\n    <div class=\"cfoot\"><span>Design System Studio · Visual Identity Manual<\u002Fspan><span>Version 1.0 · 2026<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 CHAPTER OPENER -->\n  <section class=\"page chapter\">\n    <div class=\"pad\" style=\"height:100%;display:flex;flex-direction:column;justify-content:flex-start\">\n      <div class=\"num\">03<\u002Fdiv>\n      <div class=\"toc\">\n        <div>Typeface<\u002Fdiv>\n        <div>Type Hierarchy<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"big\">TYPO-<br>GRAPHY<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\" style=\"color:rgba(255,255,255,.4)\"><span>Chapter 03<\u002Fspan><span>Typography<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 TYPOGRAPHY -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Typography<\u002Fh2>\n      <div class=\"type-grid\">\n        <div class=\"desc\">\n          <h5>Typeface<\u002Fh5>\n          Typography is a core part of Design System Studio's visual identity. Our type system is built around clarity, consistency, and modern digital experiences - a defined role for each face that creates hierarchy while staying cohesive across products, marketing, and documentation.\n          <h5>Primary - Space Grotesk<\u002Fh5>\n          Display, headlines, and large editorial titles. Set tight for a confident, modern voice.\n          <h5>Secondary - Satoshi<\u002Fh5>\n          The default interface and body typeface - navigation, forms, components, and paragraphs. Chosen for excellent readability on screen.\n          <h5>Tertiary - JetBrains Mono<\u002Fh5>\n          Reserved for labels, metadata, status, numbers, IDs, and technical information.\n        <\u002Fdiv>\n        <div class=\"showcase\">\n          <div class=\"ghost\">Aa<\u002Fdiv>\n          <h3>Space Grotesk<\u002Fh3>\n          <div class=\"type-row\"><div class=\"l\">Medium<\u002Fdiv><div class=\"s\">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>1234567890 &amp;#$€%@!?*<\u002Fdiv><\u002Fdiv>\n          <div class=\"type-row\"><div class=\"l\">SemiBold<\u002Fdiv><div class=\"s\" style=\"font-weight:600\">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>1234567890 &amp;#$€%@!?*<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 03<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 TYPE HIERARCHY -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Type Hierarchy<\u002Fh2>\n      <div class=\"hier\">\n        <div>\n          <div class=\"spec\"><div class=\"n\">Headline 1 · Display<\u002Fdiv><div class=\"m\">Space Grotesk · 700 · 96px / 0.85 · −0.05em<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\"><div class=\"n\">Headline 2<\u002Fdiv><div class=\"m\">Space Grotesk · 600 · 48px / 1.0 · −0.03em<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\"><div class=\"n\">Headline 3<\u002Fdiv><div class=\"m\">Space Grotesk · 600 · 30px / 1.1 · −0.02em<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\"><div class=\"n\">Body · Large<\u002Fdiv><div class=\"m\">Satoshi · 400 · 18px / 1.6 · 0<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\"><div class=\"n\">Body<\u002Fdiv><div class=\"m\">Satoshi · 400 · 16px / 1.6 · 0<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\"><div class=\"n\">Label · Mono<\u002Fdiv><div class=\"m\">JetBrains Mono · 500 · 12px · 0.12em · UPPER<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h3 class=\"disp\" style=\"font-size:44px;font-weight:700;margin-bottom:20px\">We don't just amplify content; we activate advocates.<\u002Fh3>\n          <p style=\"font-size:18px;line-height:1.6;color:var(--neutral-700);margin-bottom:14px\">Building an advocacy program is a coordinated effort that spans employees, customers, and partners across every professional network.<\u002Fp>\n          <h4 class=\"disp\" style=\"font-size:20px;font-weight:600;color:var(--brand-700);margin-bottom:8px\">Need help choosing a face?<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.6;color:var(--neutral-500)\">Space Grotesk leads. Satoshi carries the reading. JetBrains Mono handles the metadata. Three roles, one voice.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 04<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 LOGO -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Logo<\u002Fh2>\n      <div class=\"logo-grid\">\n        <div class=\"desc\">\n          <h5>Primary variants<\u002Fh5>\n          Use the wordmark on a dark or light background. On imagery, keep the logo sufficiently legible against the backdrop. The smallest size for print and on-screen use is based on the height of the mark.\n          <h5>Clear space<\u002Fh5>\n          Preserve clear space equal to the height of the \"W\" mark on all sides. Never crowd, recolor, or distort the wordmark.\n        <\u002Fdiv>\n        <div>\n          <div class=\"logo-card on-brand\"><span class=\"tag\">On brand / reversed<\u002Fspan><img src=\"65175c5f-c235-44f6-ae5c-d16463a532df\" alt=\"Design System Studio\"><\u002Fdiv>\n          <div class=\"logo-card on-light\" style=\"margin-top:16px\"><span class=\"tag\">On light / primary<\u002Fspan><img src=\"875d7e94-71c9-43a1-9dd7-963456b249fb\" alt=\"Design System Studio\"><\u002Fdiv>\n          <div class=\"smallest\">Smallest logo size 128px · <img src=\"875d7e94-71c9-43a1-9dd7-963456b249fb\" alt=\"Design System Studio\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 05<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 COLOUR PALETTE -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Colour Palette<\u002Fh2>\n      <p class=\"desc\" style=\"max-width:640px;margin-top:10px\">Only the colours listed in the core Brand Guidelines may be used in the visual style. Emerald is the canonical brand colour; everything else stays neutral so the accent carries meaning.<\u002Fp>\n      <div class=\"pal\">\n        <div class=\"pcard\" style=\"background:var(--brand-500);color:#fff\">\n          <div class=\"top\"><div class=\"name\">Emerald<\u002Fdiv><div class=\"role\">Primary<\u002Fdiv><\u002Fdiv>\n          <div class=\"specs\">--brand-500<b>Hex<\u002Fb>#10B981<b>RGB<\u002Fb>16 · 185 · 129<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:var(--accent-500);color:#fff\">\n          <div class=\"top\"><div class=\"name\">Leaf<\u002Fdiv><div class=\"role\">Secondary<\u002Fdiv><\u002Fdiv>\n          <div class=\"specs\">--accent-500<b>Hex<\u002Fb>#22C55E<b>RGB<\u002Fb>34 · 197 · 94<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:var(--neutral-950);color:#fff\">\n          <div class=\"top\"><div class=\"name\">Ink<\u002Fdiv><div class=\"role\">Black<\u002Fdiv><\u002Fdiv>\n          <div class=\"specs\">--neutral-950<b>Hex<\u002Fb>#0A0A0A<b>RGB<\u002Fb>10 · 10 · 10<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:#fff;color:var(--neutral-900)\">\n          <div class=\"top\"><div class=\"name\">Paper<\u002Fdiv><div class=\"role\">White<\u002Fdiv><\u002Fdiv>\n          <div class=\"specs\">--neutral-0<b>Hex<\u002Fb>#FFFFFF<b>RGB<\u002Fb>255 · 255 · 255<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 06<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 SHADES PALETTE -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Shades Palette<\u002Fh2>\n      <p class=\"desc\" style=\"max-width:640px;margin-top:10px\">Full 50–950 scales generated in the OKLCH perceptual colour space so lightness steps stay visually even. Use tints for surfaces and washes; deep shades for text and emphasis.<\u002Fp>\n      <div class=\"shades\">\n        <div class=\"srow\"><span class=\"cap\">Neutral<\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-50);border:1px solid var(--neutral-200)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-200)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-400)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-600)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-800)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--neutral-950)\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"srow\"><span class=\"cap\">Emerald · Primary<\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-50)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-200)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-400)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-500)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-700)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--brand-900)\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"srow\"><span class=\"cap\">Leaf · Secondary<\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-100)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-300)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-400)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-500)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-700)\"><\u002Fspan>\n          <span class=\"dot\" style=\"background:var(--accent-900)\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 07<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 KEY ELEMENTS -->\n  <section class=\"page\">\n    <div class=\"pad\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Key Elements<\u002Fh2>\n      <div class=\"keys\">\n        <div class=\"kcard\">\n          <div class=\"kvis radii\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n          <h4>Corner Radius<\u002Fh4>\n          <p>Sharp (0) is the in-product default for an editorial feel; the soft scale (8 / 16px) is reserved for web surfaces.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"kcard\">\n          <div class=\"kvis\"><div class=\"shadowbox\"><\u002Fdiv><\u002Fdiv>\n          <h4>Shadows<\u002Fh4>\n          <p>Soft, rare shadows only; the interface leans on spacing and contrast, never heavy elevation.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"kcard\">\n          <div class=\"kvis\" style=\"padding:0\"><div class=\"patt\"><\u002Fdiv><\u002Fdiv>\n          <h4>Patterns &amp; Gradients<\u002Fh4>\n          <p>A single restrained emerald gradient for cover and divider surfaces; hairline grids for structure. No aggressive multi-stop gradients.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 08<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 GRID -->\n  <section class=\"page gridpage\">\n    <div class=\"pad\" style=\"position:relative;z-index:2\">\n      <div class=\"eyebrow\">Content Section<\u002Fdiv>\n      <h2 class=\"disp\" style=\"font-size:34px;font-weight:700;margin-top:12px\">Layout Grid<\u002Fh2>\n      <p class=\"desc\" style=\"max-width:520px;margin-top:10px\">A 12-column grid with 16px gutters underpins application layouts. Generous editorial margins and hairline rules separate zones; structure comes from whitespace, not boxes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"gridovl\" style=\"top:260px\">\n      <div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv><div><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span>Design System Studio Brand Guidelines<\u002Fspan><span>Page 09<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
