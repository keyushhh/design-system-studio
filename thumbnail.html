<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;padding:0}
  .tile{width:1280px;height:854px;display:flex;overflow:hidden;font-family:var(--font-display)}
  .main{width:75%;background:var(--brand-500);display:flex;align-items:center;justify-content:center}
  .main img{width:62%;height:auto}
  .strip{width:25%;display:flex;flex-direction:column}
  .strip span{flex:1;display:block}
</style>
</head>
<body>
<div class="tile">
  <div class="main" style="flex-direction:column;text-align:center"><div style="font-size:52px;font-weight:700;color:#fff;letter-spacing:-.02em">Design System Studio</div><div style="font-family:var(--font-mono);font-size:18px;font-weight:600;letter-spacing:.2em;color:rgba(255,255,255,.8);margin-top:12px">OPEN EDITION · v1.0</div></div>
  <div class="strip">
    <span style="background:#6ee7b7"></span>
    <span style="background:#f59e0b"></span>
    <span style="background:#0ea5e9"></span>
    <span style="background:#064e3b"></span>
  </div>
</div>
</body>
</html>
