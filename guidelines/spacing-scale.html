<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · 1–24 steps" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-mono)}
.wrap{padding:22px 28px;display:flex;align-items:flex-end;gap:16px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--brand-500);width:var(--w);height:var(--w)}
.k{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="col"><div class="bar" style="--w:4px"></div><span class="k">1·4</span></div>
<div class="col"><div class="bar" style="--w:8px"></div><span class="k">2·8</span></div>
<div class="col"><div class="bar" style="--w:12px"></div><span class="k">3·12</span></div>
<div class="col"><div class="bar" style="--w:16px"></div><span class="k">4·16</span></div>
<div class="col"><div class="bar" style="--w:24px"></div><span class="k">6·24</span></div>
<div class="col"><div class="bar" style="--w:32px"></div><span class="k">8·32</span></div>
<div class="col"><div class="bar" style="--w:48px"></div><span class="k">12·48</span></div>
<div class="col"><div class="bar" style="--w:64px"></div><span class="k">16·64</span></div>
<div class="col"><div class="bar" style="--w:80px"></div><span class="k">20·80</span></div>
</div></body></html>
