<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Emerald" subtitle="--brand-50 → 900 · 500 is canonical" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-mono)}
.wrap{padding:22px 28px}
.row{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default)}
.sw{flex:1;height:74px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:9px;color:rgba(255,255,255,.85)}
.sw.dark{color:var(--neutral-800)}
.tag{margin-top:10px;font-size:11px;color:var(--text-muted)}
.tag b{color:var(--brand-600)}</style></head>
<body><div class="wrap">
<div class="row">
<div class="sw dark" style="background:var(--brand-50)">50</div>
<div class="sw dark" style="background:var(--brand-100)">100</div>
<div class="sw dark" style="background:var(--brand-200)">200</div>
<div class="sw dark" style="background:var(--brand-300)">300</div>
<div class="sw" style="background:var(--brand-400)">400</div>
<div class="sw" style="background:var(--brand-500)">500</div>
<div class="sw" style="background:var(--brand-600)">600</div>
<div class="sw" style="background:var(--brand-700)">700</div>
<div class="sw" style="background:var(--brand-800)">800</div>
<div class="sw" style="background:var(--brand-900)">900</div>
</div>
<div class="tag"><b>--brand-500 #10b981</b> · the single accent - eyebrows, active states, deltas, links</div>
</div></body></html>
