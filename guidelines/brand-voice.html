<!-- @dsCard group="Brand" viewport="700x180" name="Voice · do & don't" subtitle="Editorial, precise, executive" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-sans)}
.wrap{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.h{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.do .h{color:var(--success-600)}.dont .h{color:var(--error-600)}
.li{display:flex;gap:8px;font-size:13px;line-height:1.45;margin-bottom:8px;color:var(--text-secondary)}
.i{flex-shrink:0;width:16px;height:16px;border-radius:var(--radius-full);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px}
.do .i{background:var(--success-50);color:var(--success-700)}
.dont .i{background:var(--error-50);color:var(--error-600)}
.dont .li{color:var(--text-faint);text-decoration:line-through}</style></head>
<body><div class="wrap">
<div class="do"><div class="h">Do</div>
<div class="li"><span class="i">✓</span>End headlines with a period. Objective.</div>
<div class="li"><span class="i">✓</span>Frame numbers as proof: "2M reach in 7 days".</div>
<div class="li"><span class="i">✓</span>UPPERCASE mono for labels &amp; metadata.</div></div>
<div class="dont"><div class="h">Don't</div>
<div class="li"><span class="i">✕</span>Use emoji or exclamation hype!!!</div>
<div class="li"><span class="i">✕</span>Reach for gradients or heavy shadows.</div>
<div class="li"><span class="i">✕</span>Let color compete with the emerald accent.</div></div>
</div></body></html>
