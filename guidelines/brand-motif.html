<!-- @dsCard group="Brand" viewport="700x200" name="Editorial motif" subtitle="Eyebrow rule · HUD · glow · period full-stop" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);color:var(--text-primary);overflow:hidden}
.wrap{position:relative;padding:22px 28px;height:156px;box-sizing:border-box}
.glow{position:absolute;width:420px;height:420px;top:-220px;right:-160px;background:radial-gradient(circle,color-mix(in srgb,var(--brand-500) 10%,transparent),transparent 70%);pointer-events:none}
.hud{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:var(--tracking-label);color:var(--text-muted);border-bottom:1px solid var(--border-default);padding-bottom:12px}
.eye{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);color:var(--brand-600);margin:18px 0 10px}
.eye::before{content:"";width:34px;height:1px;background:var(--brand-500)}
.h{font-family:var(--font-display);font-size:40px;font-weight:700;letter-spacing:var(--tracking-display);line-height:.9}</style></head>
<body><div class="wrap"><div class="glow"></div>
<div class="hud"><span>Strategic Context</span><span>05 / 14</span></div>
<div class="eye">Performance Metric</div>
<div class="h">Pathway to Execution.</div>
</div></body></html>
