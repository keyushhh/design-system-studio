<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radius" subtitle="Sharp in-product · soft on web" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-mono)}
.wrap{padding:22px 28px;display:flex;gap:22px;align-items:flex-end}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:66px;height:56px;background:var(--neutral-100);border:1px solid var(--border-strong)}
.k{font-size:10px;color:var(--text-muted);text-align:center}</style></head>
<body><div class="wrap">
<div class="col"><div class="box" style="border-radius:var(--radius-sharp)"></div><span class="k">sharp·0<br>deck/app</span></div>
<div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="k">sm·6<br>inputs</span></div>
<div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="k">md·8<br>buttons</span></div>
<div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="k">lg·12<br>cards</span></div>
<div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="k">xl·16<br>dialogs</span></div>
<div class="col"><div class="box" style="border-radius:var(--radius-full);width:56px"></div><span class="k">full<br>pills</span></div>
</div></body></html>
