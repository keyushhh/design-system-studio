<!-- @dsCard group="Colors" viewport="700x150" name="Neutral scale" subtitle="Near-monochrome foundation on white" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-mono)}
.wrap{padding:22px 28px}
.row{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default)}
.sw{flex:1;height:74px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:9px}
.tag{margin-top:10px;font-size:11px;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="row">
<div class="sw" style="background:var(--neutral-50);color:var(--neutral-500)">50</div>
<div class="sw" style="background:var(--neutral-100);color:var(--neutral-500)">100</div>
<div class="sw" style="background:var(--neutral-200);color:var(--neutral-600)">200</div>
<div class="sw" style="background:var(--neutral-300);color:var(--neutral-700)">300</div>
<div class="sw" style="background:var(--neutral-400);color:#fff">400</div>
<div class="sw" style="background:var(--neutral-500);color:#fff">500</div>
<div class="sw" style="background:var(--neutral-600);color:#fff">600</div>
<div class="sw" style="background:var(--neutral-700);color:#fff">700</div>
<div class="sw" style="background:var(--neutral-800);color:#fff">800</div>
<div class="sw" style="background:var(--neutral-900);color:#fff">900</div>
<div class="sw" style="background:var(--neutral-950);color:#fff">950</div>
</div>
<div class="tag">High neutral contrast carries hierarchy; color is punctuation, not fill</div>
</div></body></html>
