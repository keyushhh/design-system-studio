<!-- @dsCard group="Colors" viewport="700x170" name="Surface & text roles" subtitle="Semantic aliases - target meaning, not steps" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans)}
.wrap{padding:20px 28px;display:flex;gap:16px;align-items:stretch}
.card{background:var(--surface-default);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:16px 18px;flex:1}
.t1{color:var(--text-primary);font-size:15px;font-weight:600}
.t2{color:var(--text-secondary);font-size:13px;margin-top:4px}
.t3{color:var(--text-muted);font-size:12px;margin-top:2px}
.sub{background:var(--surface-subtle);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:16px 18px;flex:1}
.n{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-top:10px}
.link{color:var(--text-link);font-size:13px;text-decoration:none;font-weight:500}</style></head>
<body><div class="wrap">
<div class="card"><div class="t1">surface-default</div><div class="t2">text-secondary on white card</div><div class="t3">text-muted caption</div><a class="link" href="#">Emerald link →</a><div class="n">canvas · default · subtle</div></div>
<div class="sub"><div class="t1">surface-subtle</div><div class="t2">Warm card accent #faf9f6</div><div class="t3">border-default hairline</div><div class="n">--surface-subtle</div></div>
</div></body></html>
