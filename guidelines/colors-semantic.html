<!-- @dsCard group="Colors" viewport="700x160" name="Semantic · status" subtitle="Success · Warning · Error · Info" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pure-white);font-family:var(--font-sans)}
.wrap{padding:22px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.col{display:flex;flex-direction:column;gap:6px}
.chip{height:40px;border-radius:var(--radius-md)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--radius-full);width:fit-content}
.n{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="col"><div class="chip" style="background:var(--success-600)"></div><span class="pill" style="background:var(--success-50);color:var(--success-700)">Success</span><span class="n">#16a34a</span></div>
<div class="col"><div class="chip" style="background:var(--warning-500)"></div><span class="pill" style="background:var(--warning-50);color:var(--warning-700)">Warning</span><span class="n">#f59e0b</span></div>
<div class="col"><div class="chip" style="background:var(--error-600)"></div><span class="pill" style="background:var(--error-50);color:var(--error-700)">Error</span><span class="n">#dc2626</span></div>
<div class="col"><div class="chip" style="background:var(--info-600)"></div><span class="pill" style="background:var(--info-50);color:var(--info-700)">Info</span><span class="n">#0284c7</span></div>
</div></body></html>
