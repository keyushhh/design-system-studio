<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation" subtitle="Rare & soft - spacing + contrast over shadow" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--neutral-50);font-family:var(--font-mono)}
.wrap{padding:26px 28px;display:flex;gap:26px;align-items:center}
.col{display:flex;flex-direction:column;align-items:center;gap:12px}
.box{width:96px;height:60px;background:var(--pure-white);border:1px solid var(--border-subtle);border-radius:var(--radius-lg)}
.k{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="k">xs</span></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="k">sm</span></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="k">md</span></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-soft)"></div><span class="k">soft·cards</span></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-lift)"></div><span class="k">lift·panels</span></div>
</div></body></html>
