<!-- @dsCard group="Brand" viewport="700x180" name="Logo · Design System Studio wordmark" subtitle="Winged-W mark · black / reversed white" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="../theme-init.js"></script><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-mono)}
.wrap{display:flex;height:180px}
.a,.b{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.a{background:var(--pure-white);border-right:1px solid var(--border-default)}
.b{background:var(--brand-500)}
.a img,.b img{width:210px;height:auto}
.tag{position:absolute;top:12px;left:16px;font-size:9px;text-transform:uppercase;letter-spacing:.12em}
.a .tag{color:var(--text-faint)}.b .tag{color:rgba(255,255,255,.7)}</style></head>
<body><div class="wrap">
<div class="a"><span class="tag">Primary / on light</span><img src="../assets/logo-black.png" alt="Design System Studio"></div>
<div class="b"><span class="tag">Reversed / on brand</span><img src="../assets/logo-white.png" alt="Design System Studio"></div>
</div></body></html>
